<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kids' Schedule</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }

    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 32px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: nowrap;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .controls label { font-size: 0.85rem; font-weight: 600; color: #718096; white-space: nowrap; }

    .day-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .day-btn:hover { border-color: #667eea; color: #667eea; }
    .day-btn.active { background: #667eea; color: white; border-color: #667eea; }

    .note-banner {
      margin: 16px 32px 0 32px;
      padding: 10px 16px;
      background: #fff8e1;
      border-left: 4px solid #f59e0b;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      color: #92400e;
      display: none;
    }

    .grid-container {
      padding: 20px 32px 40px;
      overflow-x: auto;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: 70px repeat(3, 1fr);
      gap: 0;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      min-width: 500px;
    }

    .grid-header {
      background: #2d3748;
      color: white;
      padding: 14px 12px;
      font-weight: 700;
      font-size: 0.95rem;
      text-align: center;
      position: sticky;
      top: 49px;
      z-index: 50;
    }

    .grid-header.time-col {
      background: #1a202c;
      font-size: 0.8rem;
      position: sticky;
      top: 49px;
      z-index: 51;
    }

    .grid-header .child-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0 auto 4px;
    }

    .grid-header .child-name { display: inline; }

    .time-cell {
      background: #edf2f7;
      padding: 8px 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #718096;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .activity-cell {
      padding: 6px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.3;
      font-weight: 500;
      min-height: 44px;
      transition: filter 0.2s;
    }

    .act-school      { background: #c6f6d5; color: #22543d; }
    .act-breakfast   { background: #fefcbf; color: #744210; }
    .act-lunch       { background: #fef3c7; color: #78350f; }
    .act-dinner      { background: #fed7aa; color: #7c2d12; }
    .act-sleep       { background: #e9d8fd; color: #44337a; }
    .act-bath        { background: #bee3f8; color: #1a365d; }
    .act-play        { background: #c6f6d5; color: #1c4532; }
    .act-dance       { background: #fbb6ce; color: #702459; }
    .act-getready    { background: #fed7aa; color: #7c2d12; }
    .act-wakeup      { background: #fef9c3; color: #713f12; }
    .act-pickup      { background: #e2e8f0; color: #2d3748; }
    .act-hair        { background: #e9d8fd; color: #44337a; }
    .act-bedtime     { background: #a3bffa; color: #1a202c; }
    .act-comp        { background: #fed7e2; color: #97266d; font-weight: 700; }
    .act-default     { background: #f7fafc; color: #4a5568; }

    .even-row .time-cell { background: #f7fafc; }

    .schedule-grid .activity-cell:hover {
      filter: brightness(0.93);
      cursor: default;
    }

    .summary-section {
      padding: 0 32px 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .summary-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-card .badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: white;
    }

    .highlight-list { list-style: none; }
    .highlight-list li {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.82rem;
      color: #4a5568;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .highlight-list li:last-child { border-bottom: none; }
    .highlight-list li .dot { color: #667eea; font-size: 0.6rem; margin-top: 5px; flex-shrink: 0; }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
        padding: 14px 16px;
      }
      header h1 { font-size: 1.3rem; }
      header p { font-size: 0.8rem; }

      .legend { gap: 6px; }
      .legend-item { font-size: 0.7rem; padding: 3px 8px; }

      .controls {
        padding: 8px 12px;
        gap: 6px;
      }
      .controls label { font-size: 0.75rem; }
      .day-btn {
        padding: 5px 10px;
        font-size: 0.75rem;
        border-width: 1.5px;
      }

      .note-banner { margin-left: 12px; margin-right: 12px; font-size: 0.78rem; }

      .grid-container {
        padding: 12px 0 24px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .schedule-grid {
        grid-template-columns: 54px repeat(3, 1fr);
        min-width: 360px;
        border-radius: 0;
        margin: 0;
      }

      .grid-header {
        padding: 8px 4px;
        font-size: 0.75rem;
        top: 41px;
      }
      .grid-header.time-col {
        font-size: 0.65rem;
        top: 41px;
      }
      .grid-header .child-avatar {
        width: 28px; height: 28px;
        font-size: 0.85rem;
        margin-bottom: 2px;
      }

      .time-cell {
        padding: 6px 3px;
        font-size: 0.65rem;
      }

      .activity-cell {
        padding: 5px 3px;
        font-size: 0.68rem;
        min-height: 36px;
        line-height: 1.2;
        word-break: break-word;
        hyphens: auto;
      }

      .summary-section {
        grid-template-columns: 1fr;
        padding: 0 12px 24px;
        gap: 10px;
      }
      .summary-card { padding: 14px; }
      .summary-card h3 { font-size: 0.9rem; }
      .highlight-list li { font-size: 0.78rem; }
    }

    @media (max-width: 400px) {
      .schedule-grid {
        grid-template-columns: 46px repeat(3, 1fr);
        min-width: 320px;
      }
      .time-cell { font-size: 0.6rem; padding: 5px 2px; }
      .activity-cell { font-size: 0.62rem; padding: 4px 2px; min-height: 32px; }
      .grid-header { font-size: 0.68rem; padding: 6px 2px; }
      .grid-header .child-avatar { width: 24px; height: 24px; font-size: 0.75rem; }
      .day-btn { padding: 4px 8px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🗓️ Kids' Weekly Schedule</h1>
    <p>Wednesday – Sunday · Isaac, Eliana &amp; Delilah</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22543d"></div> School / Play</div>
    <div class="legend-item"><div class="legend-dot" style="background:#744210"></div> Meals</div>
    <div class="legend-item"><div class="legend-dot" style="background:#702459"></div> Dance</div>
    <div class="legend-item"><div class="legend-dot" style="background:#97266d"></div> Dance Comp</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a365d"></div> Bedtime / Sleep</div>
  </div>
</header>

<div class="controls">
  <label>View Day:</label>
  <button class="day-btn active" onclick="showDay('Wednesday')">Wednesday</button>
  <button class="day-btn" onclick="showDay('Thursday')">Thursday</button>
  <button class="day-btn" onclick="showDay('Friday')">Friday</button>
  <button class="day-btn" onclick="showDay('Saturday')">Saturday</button>
  <button class="day-btn" onclick="showDay('Sunday')">Sunday</button>
</div>

<div class="note-banner" id="noteBanner"></div>

<div class="grid-container">
  <div class="schedule-grid" id="scheduleGrid"></div>
</div>

<div class="summary-section" id="summarySection"></div>

<script>
const CHILDREN = ['Isaac', 'Eliana', 'Delilah'];
const CHILD_COLORS = { Isaac: '#667eea', Eliana: '#f093fb', Delilah: '#4fd1c5' };
const CHILD_EMOJI = { Isaac: '👦', Eliana: '👧', Delilah: '🧒' };

const TIMES = [
  '6:00 AM','6:30 AM','7:00 AM','7:30 AM','8:00 AM','8:30 AM','9:00 AM','9:30 AM',
  '10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM',
  '2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM','5:30 PM',
  '6:00 PM','6:30 PM','7:00 PM','7:30 PM'
];

// Data directly from Book1.xlsx — rows 3-30, mapped exactly
const data = {
  Wednesday: {
    Isaac: ["Wake up", "Breakfast", "Get ready for school", "Drop Eliana at School", "Drop Isaac at School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "Pick up from School", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "play", "Bed time"],
    Eliana: ["Wake up", "Breakfast", "Get ready for School", "Drop Eliana at School @ 7:20", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "Pick up from School @ 1:50", "Play", "Play", "Play", "Leave at 3:40 for  dance at 4:00", "ACRO Dance", "ACRO Dance", "Comp Team Jazz Practice", "Comp Team Jazz Practice", "Pick up Eliana From Dance", "Get ready for bed", "play", "Bed time"],
    Delilah: ["Wake up", "Play", "Play", "Play", "Breakfast", "Play", "Play", "Play", "Play", "Lunch", "Play", "Nap", "Nap", "Nap", "Nap", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "Bed time", ""],
  },
  Thursday: {
    Isaac: ["Wake up", "Breakfast", "Get ready for school", "Drop Eliana at School", "Drop Isaac at School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "Pick up from School", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Play", "Get ready for bed", "play", "Bed time"],
    Eliana: ["Wake up", "Breakfast", "Get ready for School", "Drop Eliana at School @ 7:20", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "School", "Pick up from School", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "play", "Bed time"],
    Delilah: ["Wake up", "Play", "Play", "Play", "Breakfast", "Play", "Play", "Play", "Play", "Lunch", "Play", "Nap", "Nap", "Nap", "Nap", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Play", "Get ready for bed", "Bed time", ""],
  },
  Friday: {
    Isaac: ["", "Wake up", "Breakfast", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Lunch", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "play", "Bed time"],
    Eliana: ["", "Wake up", "Breakfast", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Lunch", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Leave at 4:20 for dance at @ 4:45", "Lil Broadway Dance Practice", "Pick up Eliana from dance", "Get Hair done", "Get Hair done", "Get Hair done", "Bed time"],
    Delilah: ["Wake up", "Play", "Play", "Play", "Breakfast", "Play", "Play", "Play", "Play", "Lunch", "Play", "Nap", "Nap", "Nap", "Nap", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "Bed time", ""],
  },
  Saturday: {
    Isaac: ["", "Wake up", "Breakfast", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Lunch", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Play", "Get ready for bed", "play", "Bed time"],
    Eliana: ["", "Wake up", "Breakfast", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Lunch", "Play", "Play", "Play", "Play", "Leave for Fairgrounds @ 2:45", "Drive to Fairgrounds", "Arrive at Fairgounds", "Prep for Dance", "Prep for Dance", "Dance Comp: Girl in the Mirror", "Wait for awards", "Awards", "Awards", "Go home", "Bed time"],
    Delilah: ["Wake up", "Play", "Play", "Play", "Breakfast", "Play", "Play", "Play", "Play", "Lunch", "Play", "Nap", "Nap", "Nap", "Nap", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Play", "Get ready for bed", "Bed time", ""],
  },
  Sunday: {
    Isaac: ["", "Wake up", "Breakfast", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Lunch", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "play", "Bed time"],
    Eliana: ["", "Wake up", "Breakfast", "Play", "Leave for Fairgrounds @ 8:15", "Drive to Fairgrounds", "Arrive at Fairgounds", "Prep for Dance", "Prep for Dance", "Dance Comp: Cool Cats in Town", "Wait for awards", "Wait for awards", "Awards", "Come Home", "Bath", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Play", "Get ready for bed", "play", "Bed time"],
    Delilah: ["Wake up", "Play", "Play", "Play", "Breakfast", "Play", "Play", "Play", "Play", "Lunch", "Play", "Nap", "Nap", "Nap", "Nap", "Play", "Play", "Play", "Play", "Play", "Play", "Play", "Dinner", "Dinner", "Bath", "Get ready for bed", "Bed time", ""],
  },
};

const NOTES = {
  Saturday: '🏆 Dance Competition Day! Eliana: Dance Comp – Girl in the Mirror',
  Sunday:   '🏆 Dance Competition Day! Eliana: Dance Comp – Cool Cats in Town'
};

function classifyActivity(act) {
  if (!act || act === '-') return 'act-default';
  const a = act.toLowerCase();
  if (a.includes('dance comp') || a.includes('cool cats') || a.includes('girl in the mirror')) return 'act-comp';
  if (a.includes('wait for awards') || a === 'awards') return 'act-comp';
  if (a.includes('fairgrounds') || a.includes('fairgounds') || a.includes('prep for dance')) return 'act-comp';
  if (a.includes('go home') && act === 'Go home') return 'act-comp';
  if (a.includes('school') && !a.includes('get ready') && !a.includes('drop') && !a.includes('pick')) return 'act-school';
  if (a.includes('breakfast')) return 'act-breakfast';
  if (a.includes('lunch')) return 'act-lunch';
  if (a.includes('dinner')) return 'act-dinner';
  if (a.includes('nap')) return 'act-sleep';
  if (a.includes('bed time') || a.includes('bedtime')) return 'act-bedtime';
  if (a.includes('bath')) return 'act-bath';
  if (a.includes('dance') || a.includes('broadway')) return 'act-dance';
  if (a.includes('hair')) return 'act-hair';
  if (a.includes('get ready')) return 'act-getready';
  if (a.includes('wake up')) return 'act-wakeup';
  if (a.includes('pick up') || a.includes('drop') || a.includes('leave at') || a.includes('leave for')) return 'act-pickup';
  if (a.includes('play')) return 'act-play';
  return 'act-default';
}

function showDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.textContent === day));

  const banner = document.getElementById('noteBanner');
  if (NOTES[day]) {
    banner.style.display = 'block';
    banner.innerHTML = '⭐ <strong>Note:</strong> ' + NOTES[day];
  } else {
    banner.style.display = 'none';
  }

  const grid = document.getElementById('scheduleGrid');
  grid.innerHTML = '';

  const timeHead = document.createElement('div');
  timeHead.className = 'grid-header time-col';
  timeHead.textContent = 'Time';
  grid.appendChild(timeHead);

  CHILDREN.forEach(child => {
    const h = document.createElement('div');
    h.className = 'grid-header';
    h.innerHTML = `<div class="child-avatar" style="background:${CHILD_COLORS[child]}">${CHILD_EMOJI[child]}</div><span class="child-name">${child}</span>`;
    grid.appendChild(h);
  });

  const dayData = data[day];

  TIMES.forEach((time, i) => {
    const isEven = i % 2 === 0;
    const rowClass = isEven ? 'even-row' : '';

    const tCell = document.createElement('div');
    tCell.className = `time-cell ${rowClass}`;
    tCell.textContent = time;
    grid.appendChild(tCell);

    CHILDREN.forEach(child => {
      const activity = (dayData[child] && dayData[child][i]) ? dayData[child][i] : '';
      const cell = document.createElement('div');
      cell.className = `activity-cell ${classifyActivity(activity)} ${rowClass}`;
      cell.textContent = activity || '—';
      grid.appendChild(cell);
    });
  });

  buildSummary(day);
}

function buildSummary(day) {
  const section = document.getElementById('summarySection');
  section.innerHTML = '';
  const dayData = data[day];

  CHILDREN.forEach(child => {
    const card = document.createElement('div');
    card.className = 'summary-card';

    const highlights = [];
    const acts = dayData[child] || [];

    acts.forEach((act, i) => {
      if (!act || act === '-') return;
      const a = act.toLowerCase();

      if (a.includes('school') && !a.includes('drop') && !a.includes('pick') && !a.includes('get ready') && highlights.every(h => !h.includes('School'))) {
        highlights.push('📚 School day');
      }
      if ((a.includes('dance comp') || a.includes('cool cats') || a.includes('girl in the mirror')) && highlights.every(h => !h.includes('🏆'))) {
        highlights.push(`🏆 ${act}`);
      }
      if ((a.includes('dance') || a.includes('broadway')) && !a.includes('dance comp') && highlights.every(h => !h.includes('💃') && !h.includes('🏆'))) {
        highlights.push(`💃 ${act}`);
      }
      if (a.includes('hair') && highlights.every(h => !h.includes('💇'))) {
        highlights.push(`💇 ${act}`);
      }
      if ((a.includes('leave for fairgrounds') || a.includes('arrive at fairg')) && highlights.every(h => !h.includes('Fairground'))) {
        highlights.push(`🚗 ${act}`);
      }
      if ((a.includes('drop eliana') || a.includes('drop isaac') || a.includes('pick up from school') || a.includes('pick up eliana')) && highlights.every(h => h !== `🚗 ${act}`)) {
        highlights.push(`🚗 ${act}`);
      }
    });

    const bedIndex = acts.findIndex(a => a && (a.toLowerCase().includes('bed time') || a.toLowerCase().includes('bedtime')));
    if (bedIndex >= 0) highlights.push(`🌙 Bedtime: ${TIMES[bedIndex]}`);

    const wakeIndex = acts.findIndex(a => a && a.toLowerCase().includes('wake up'));
    if (wakeIndex >= 0) highlights.push(`☀️ Wake up: ${TIMES[wakeIndex]}`);

    card.innerHTML = `
      <h3>
        <span class="badge" style="background:${CHILD_COLORS[child]}">${CHILD_EMOJI[child]}</span>
        ${child}
      </h3>
      <ul class="highlight-list">
        ${highlights.length ? highlights.map(h => `<li><span class="dot">●</span>${h}</li>`).join('') : '<li><span class="dot">●</span>Free day – lots of play!</li>'}
      </ul>
    `;
    section.appendChild(card);
  });
}

showDay('Wednesday');
</script>
</body>
</html>
